default_language_version:
    python: python3.11
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # v6.0.0
    hooks:
    -   id: check-json
    -   id: check-merge-conflict
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files
    -   id: pretty-format-json
        args:
        - --autofix
    -   id: detect-private-key
-   repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: ad1b27d73581aa16cca06fc4a0761fc563ffe8e8 # v1.5.6
    hooks:
    -   id: forbid-tabs
        exclude_types:
        - python
        - javascript
        - dtd
        - markdown
        - makefile
        - xml
        exclude: binary|\.bin$
-   repo: https://github.com/jameswoolfenden/pre-commit-shell
    rev: 062f0b028ae65827e04f91c1e6738cfcbe9b337f # v1.0.6
    hooks:
    -   id: shell-lint
        exclude: template|\.template$
-   repo: https://github.com/igorshubovych/markdownlint-cli
    rev: a4d5d37e66ebcd6b3705204a1d6dbb56dea66338 # v0.49.0
    hooks:
    -   id: markdownlint
-   repo: https://github.com/jameswoolfenden/pre-commit
    rev: c5bdf92051a9e574d62152d81a3bd98a71816dd3 # v0.1.62
    hooks:
    -   id: terraform-fmt
        language_version: python3.11
    -   id: tf2docs
        language_version: python3.11
-   repo: https://github.com/bridgecrewio/checkov
    rev: 807eb133d5262412e1eda79c7495fd8145a59920 # 3.3.1
    hooks:
    -   id: checkov
        files: .
        verbose: true
        entry: checkov -d example/examplea --external-checks-dir checkov --download-external-modules true --compact
-   repo: https://github.com/jameswoolfenden/pike
    rev: 0c38c82da436d8f3cbc51c5d0ca8387be2b08e7c # v1.0.3
    hooks:
    -   id: pike-docs-go
        args: ["readme","-d", ".", "-i"]
-   repo: https://github.com/rhysd/actionlint
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12
    hooks:
      - id: actionlint
-   repo: https://github.com/jameswoolfenden/ghat
    rev: 4d552d40dfe1c98d1cf9aab3009a5f9d61c9852f # v0.1.44
    hooks:
    -   id: ghat-go
    -   id: ghat-go-sift
